# Example Nginx layout for xopc-store (SSL paths are placeholders).
# Adjust root paths to match /opt/xopc-store on your server.

server {
    listen 443 ssl http2;
    server_name store.example.com;

    ssl_certificate     /etc/ssl/certs/store.example.com.crt;
    ssl_certificate_key /etc/ssl/private/store.example.com.key;

    # React SPA
    location / {
        root /opt/xopc-store/apps/web/dist;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        alias /opt/xopc-store/data/packages/;
        add_header Content-Disposition attachment;
        add_header X-Content-Type-Options nosniff;
        types { application/zip zip; }
        default_type application/octet-stream;
    }
}
