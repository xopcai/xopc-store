# 示例：与 scripts/deploy.sh 生成的配置思路一致。
# 将 store.xopc.ai 换成你的域名；API 端口与 PM2 / ecosystem 中一致。
# SSL 由 certbot 管理，证书路径形如 /etc/letsencrypt/live/<域名>/

server {
    listen 443 ssl http2;
    server_name store.xopc.ai;

    ssl_certificate     /etc/letsencrypt/live/store.xopc.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.xopc.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/xopc-store/apps/web/dist;
    index index.html;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /files/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
